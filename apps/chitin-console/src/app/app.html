<div class="shell">
  <header class="topbar">
    <a routerLink="/queue" class="brand" aria-label="Chitin Console home">
      <svg class="brand-logo" viewBox="0 0 32 32" width="22" height="22" aria-hidden="true">
        <polygon points="8,4 24,4 30,16 24,28 8,28 2,16" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <polygon points="12,11 20,11 23,16 20,21 12,21 9,16" fill="currentColor" opacity="0.18"/>
        <circle cx="16" cy="16" r="2.4" fill="currentColor"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name mono">chitin</span>
      </div>
    </a>

    <!-- Desktop nav (hidden on mobile, bottom tab bar takes over). -->
    <nav class="nav nav-desktop" aria-label="Primary">
      @for (n of primaryNav; track n.path) {
        <a [routerLink]="n.path"
           routerLinkActive="active"
           class="nav-item"
           [attr.aria-label]="n.label">
          <span class="nav-label">{{ n.label }}</span>
        </a>
      }
      <button class="nav-item nav-more-btn"
              type="button"
              [class.active]="moreOpen()"
              (click)="toggleMore()"
              aria-label="More navigation">
        <span class="nav-label">More</span>
      </button>
    </nav>

    <div class="topbar-right">
      @if (health()) {
        <div class="api-status" [class.ok]="health()?.ok" [class.bad]="!health()?.ok"
             [title]="health()?.ok ? 'API connected' : 'API unreachable'">
          <span class="dot"></span>
        </div>
      }
    </div>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile bottom tab bar -->
  <nav class="tabbar" aria-label="Primary (mobile)">
    @for (n of primaryNav; track n.path) {
      <a [routerLink]="n.path"
         routerLinkActive="active"
         class="tab"
         [attr.aria-label]="n.label">
        <span class="tab-label">{{ n.label }}</span>
      </a>
    }
    <button class="tab tab-more"
            type="button"
            [class.active]="moreOpen()"
            (click)="toggleMore()"
            aria-label="More navigation">
      <span class="tab-label">More</span>
    </button>
  </nav>

  <!-- More overlay -->
  @if (moreOpen()) {
    <div class="more-overlay" (click)="closeMore()" aria-hidden="true"></div>
    <aside class="more-sheet" role="dialog" aria-label="More navigation">
      <header class="more-head">
        <span class="more-title mono">More</span>
        <button class="btn-close" type="button" (click)="closeMore()" aria-label="Close">✕</button>
      </header>
      <ul class="more-list">
        @for (n of secondaryNav; track n.path) {
          <li>
            <a [routerLink]="n.path" (click)="closeMore()" class="more-item">
              <span class="more-label">{{ n.label }}</span>
            </a>
          </li>
        }
      </ul>
    </aside>
  }
</div>
