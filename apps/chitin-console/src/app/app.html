<div class="shell">
  <div class="hex-bg"></div>
  <header class="topbar">
    <a routerLink="/overview" class="brand" aria-label="Chitin Console home">
      <svg class="brand-logo" viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
        <polygon points="8,4 24,4 30,16 24,28 8,28 2,16" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <polygon points="12,11 20,11 23,16 20,21 12,21 9,16" fill="currentColor" opacity="0.18"/>
        <circle cx="16" cy="16" r="2.4" fill="currentColor"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name mono">chitin</span>
        <span class="brand-sub">console</span>
      </div>
    </a>

    <nav class="nav" aria-label="Primary">
      @for (n of nav; track n.path) {
        @if (n.external) {
          <a [attr.href]="n.path" class="nav-item">
            <span class="nav-icon" aria-hidden="true" [attr.data-icon]="n.icon"></span>
            <span class="nav-label">{{ n.label }}</span>
          </a>
        } @else {
          <a [routerLink]="n.path"
             routerLinkActive="active"
             class="nav-item">
            <span class="nav-icon" aria-hidden="true" [attr.data-icon]="n.icon"></span>
            <span class="nav-label">{{ n.label }}</span>
          </a>
        }
      }
    </nav>

    <div class="topbar-right">
      @if (boardSvc.boards().length > 1) {
        <select class="board-picker mono"
                aria-label="Board"
                [ngModel]="boardSvc.current()"
                (ngModelChange)="onBoardChange($event)">
          @for (b of boardSvc.boards(); track b.slug) {
            <option [value]="b.slug">{{ b.slug }}</option>
          }
        </select>
      }
      @if (health()) {
        <div class="api-status" [class.ok]="health()?.ok" [class.bad]="!health()?.ok"
             [title]="health()?.ok ? 'API connected · board ' + boardSvc.current() : 'API unreachable'">
          <span class="dot"></span>
          <span class="mono">{{ health()?.ok ? (boardSvc.current() || 'connected') : 'offline' }}</span>
        </div>
      }
    </div>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <footer class="footer">
    <span class="mono">chitin-console · local · read-only</span>
    <span class="mono">port 4200 → 7878</span>
  </footer>
</div>
