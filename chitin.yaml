id: chitin-governance-baseline
name: Chitin v2 baseline governance
description: Block classes of actions that the 2026-04-21 hermes autonomy incident demonstrated were dangerous.
mode: enforce

bounds:
  # Default ceilings — applied to push-shaped actions whose action_type
  # has no per_action override. Calibrated for code commits (the
  # original Hermes autonomy v1 incident class).
  max_files_changed: 25
  max_lines_changed: 500
  # Per-action overrides (#70 closure). Doc-batch pushes via git.push
  # legitimately exceed code-commit ceilings (wiki regen, multi-doc
  # rewrites — see karpathy lint loop). github.pr.create stays slightly
  # tighter than git.push because PR-create is a heavier-weight action
  # and gets human review.
  per_action:
    git.push:
      max_files_changed: 200
      max_lines_changed: 5000
    github.pr.create:
      max_files_changed: 100
      max_lines_changed: 2000

escalation:
  elevated_threshold: 3
  high_threshold: 7
  lockdown_threshold: 10
  max_retries_per_action: 3

invariantModes:
  no-governance-self-modification: enforce
  no-rm-recursive: guide
  no-destructive-rm: guide
  no-force-push: enforce
  no-protected-push: guide
  no-env-file-write: enforce
  no-remote-code-exec: guide
  protected-system-path-write: enforce
  protected-credential-path-write: enforce
  protected-system-path-shell-write: enforce

rules:
  # Direct rm-recursive — closes #58 (whitespace, quoted-flag, split-flag,
  # reordered-flag bypass family). canon's IsRecursiveDelete re-tags any
  # rm-with-recursive variant to file.recursive_delete; this rule fires
  # regardless of how the command was spelled.
  - id: no-rm-recursive
    action: file.recursive_delete
    effect: deny
    reason: "Recursive delete is blocked — use targeted file operations"
    suggestion: "Use git rm <specific-files>, or rm <specific-file>. Mass deletion requires human review."
    correctedCommand: "git rm <specific-files>"

  # Substring fallback for obfuscated rm-rf inside execute_code (string
  # concatenation, f-strings, pathlib.unlink wrappers) — canon can't see
  # through these so the action stays shell.exec and we match by literal.
  - id: no-destructive-rm
    action: shell.exec
    effect: deny
    target: "rm -rf"
    reason: "Recursive delete is blocked — use targeted file operations"
    suggestion: "Use git rm <specific-files>, or rm <specific-file>. Mass deletion requires human review."
    correctedCommand: "git rm <specific-files>"

  - id: no-destructive-rm-via-execute-code
    action: shell.exec
    effect: deny
    target_regex: '(?:subprocess\.(?:run|call|Popen|check_call|check_output)\([[:space:]]*\[[[:space:]]*[''"]rm[''"],[[:space:]]*[''"]-rf?[''"])|(?:shutil\.rmtree)'
    reason: "Recursive delete via execute_code subprocess is blocked"
    suggestion: "This rule fires on the normalized action, catching execute_code bypass attempts."

  - id: no-force-push
    action: git.force-push
    effect: deny
    reason: "Force push rewrites shared history"

  # Closes #60: bare `git push` (no remote, or no explicit branch refspec
  # like `HEAD:fix/x`) is treated as suspicious because gov can't verify
  # the destination. canon emits the sentinel "<HEAD-implicit>" Target
  # for this case so the rule's branches list catches it without
  # driver-side cwd resolution.
  - id: no-protected-push
    action: git.push
    effect: deny
    branches: [main, master, "<HEAD-implicit>"]
    reason: "Direct push to protected branch (or bare push: branch unresolved, cannot verify protected status)"
    suggestion: "Push to a feature branch with an explicit refspec and open a pull request"
    correctedCommand: "git push origin HEAD:fix/<issue>-<slug>"

  - id: no-env-file-write
    action: file.write
    effect: deny
    target: ".env"
    reason: "Secrets files must not be modified by agents"

  # Block direct writes/deletes targeting system paths. Mirrors hermes'
  # _SENSITIVE_PATH_PREFIXES — ported here after 2026-05-05 manual test
  # showed chitin's gate allowed `file.write /etc/hostname` because no
  # rule covered system paths and default-allow-file-write let it through.
  # path_under is a literal begins-with prefix match; over-deny in this
  # direction is the correct failure mode for credential/system files.
  - id: protected-system-path-write
    action: [file.write, file.delete]
    effect: deny
    path_under:
      - "/etc/"
      - "/boot/"
      - "/usr/lib/systemd/"
      - "/usr/lib/sudo/"
      - "/private/etc/"
      - "/private/var/"
      - "/Library/LaunchDaemons/"
      - "/System/"
    reason: "System paths cannot be modified by agents — operator must intervene"
    suggestion: "Use the operator's interactive shell for legitimate system mutations"
    escalation_weight: 2

  # Same intent for user credential and shell-init files, but written
  # as a regex so it matches every operator's $HOME (/home/*, /Users/*, /root)
  # without baking a specific username into the policy. Mirrors hermes'
  # build_write_denied_paths/_prefixes lists.
  - id: protected-credential-path-write
    action: [file.write, file.delete]
    effect: deny
    target_regex: '^(?:/home/[^/]+|/Users/[^/]+|/root)/(?:\.ssh/|\.aws/|\.gnupg/|\.kube/|\.docker/|\.azure/|\.config/gh/|\.bashrc|\.zshrc|\.profile|\.bash_profile|\.zprofile|\.netrc|\.pgpass|\.npmrc|\.pypirc)'
    reason: "Credential or shell-init files cannot be modified by agents"
    suggestion: "Operator manages credentials; agents must not write to ~/.ssh, ~/.aws, shell rc files, etc."
    escalation_weight: 2

  # Catches the shell-side bypass: `sudo tee /etc/hostname`, `dd of=/etc/...`,
  # and bare redirect (`> /etc/foo`, `>> /etc/foo`). cp/mv/install have
  # ambiguous arg ordering (source can be a system path on a legitimate
  # read-then-copy) and are not matched here — file.write coverage above
  # catches anything that lands as a tool-shaped write.
  - id: protected-system-path-shell-write
    action: shell.exec
    effect: deny
    target_regex: '(?:(?:^|[\s;&|`])(?:sudo\s+)?tee\b(?:\s+-\S+)*\s+|(?:^|[\s;&|`])(?:sudo\s+)?dd\s+(?:[a-zA-Z]+=\S+\s+)*of=|>>?\s*)(?:/etc/|/boot/|/usr/lib/systemd/|/usr/lib/sudo/|/private/etc/|/private/var/|/Library/LaunchDaemons/|/System/|(?:/home/[^/]+|/Users/[^/]+|/root)/(?:\.ssh/|\.aws/|\.gnupg/|\.kube/|\.docker/|\.azure/|\.config/gh/|\.bashrc|\.zshrc|\.profile|\.bash_profile|\.zprofile|\.netrc|\.pgpass|\.npmrc|\.pypirc))'
    reason: "Shell command writes to a protected system or credential path"
    suggestion: "Use the operator's interactive shell for legitimate system mutations"
    escalation_weight: 2

  - id: no-governance-self-modification
    action: file.write
    effect: escalate
    # Match whether the path is relative to a chitin repo root OR absolute.
    # Previously anchored on ^ only, which missed absolute paths like
    # "/home/red/workspace/chitin/chitin.yaml" — a bypass the agent could
    # exploit by writing with the full path instead of a repo-relative one.
    target_regex: '(?:(?:^|/)chitin\.yaml$|(?:^|/)\.chitin/|(?:^|/)\.hermes/plugins/chitin-governance/)'
    reason: "Agents may not modify their own governance policy or plugin without operator approval"
    # Operator-tier carve-out (closes the dogfood paradox): queue an
    # escalation that the operator approves via `chitin-kernel pending
    # approve <id>` instead of blanket deny. Channel cli-only (no
    # hermes infra needed); 10min decision window; 5min remember-grant
    # so a multi-edit session needs one approval, not N.
    # Spec: docs/superpowers/specs/2026-05-07-operator-approval-escalation-design.md
    escalation:
      channel: cli-only
      timeout_seconds: 600
      remember_window_seconds: 300
    escalation_weight: 2

  - id: no-terraform-destroy
    action: infra.destroy
    effect: deny
    reason: "terraform destroy removes live infrastructure"
    suggestion: "Use `terraform plan` first; if destroy is intended, it requires a human-approved path (not an agent action)"
    correctedCommand: "terraform plan"

  # Closes #61: broadens the prior curl-pipe-bash regex to catch wget,
  # process substitution `bash <(curl ...)`, and the two-stage form
  # `curl -o /tmp/x.sh && bash /tmp/x.sh`. canon's IsRemoteCodeExec
  # detector annotates Action.Params["shape"]="remote-code-exec" so
  # callers can also key off the canonical shape, but this regex on
  # the raw command is sufficient for the most common forms.
  - id: no-remote-code-exec
    action: shell.exec
    effect: deny
    target_regex: '\b(?:curl|wget|fetch)\b[^|;&]*\|\s*(?:bash|sh|zsh)\b|\b(?:bash|sh|zsh)\s*<\(\s*(?:curl|wget|fetch)\b'
    reason: "Remote code execution: fetching and immediately running untrusted script"
    suggestion: "Download first (`curl -fsSLo /tmp/x.sh <url>`), inspect, then run explicitly if safe"
    correctedCommand: "curl -fsSLo /tmp/script.sh <url> && less /tmp/script.sh"

  - id: default-allow-reads
    action: file.read
    effect: allow
    reason: "Reads are always safe"

  - id: default-allow-git-read
    action: [git.diff, git.log, git.status, git.worktree.list]
    effect: allow
    reason: "Git read operations are always safe"

  - id: default-allow-github-read
    action: [github.issue.list, github.issue.view, github.pr.list, github.pr.view, github.api]
    effect: allow
    reason: "GitHub read-only operations allowed"

  - id: default-allow-github-write
    action: [github.issue.create, github.issue.close, github.pr.create, github.pr.close, github.pr.merge]
    effect: allow
    reason: "GitHub state-changing operations allowed (bounds still apply to pr.create)"

  - id: default-allow-git-ops
    action: [git.commit, git.checkout, git.branch.create, git.branch.delete, git.merge, git.worktree.add, git.worktree.remove]
    effect: allow
    reason: "Non-push git operations allowed"

  - id: default-allow-git-push
    action: git.push
    effect: allow
    reason: "Push to non-protected branches (bounds still apply)"

  - id: default-allow-tests
    action: [test.run]
    effect: allow
    reason: "Running tests is always safe"

  - id: default-allow-delegate
    action: delegate.task
    effect: allow
    reason: "Delegation to subagents allowed"

  - id: default-allow-http
    action: http.request
    effect: allow
    reason: "HTTP requests allowed"

  - id: default-allow-mcp
    action: mcp.call
    effect: allow
    reason: "MCP tool invocations allowed"

  - id: default-allow-shell
    action: shell.exec
    effect: allow
    reason: "Shell commands allowed by default (specific dangerous patterns denied above)"

  - id: default-allow-file-write
    action: file.write
    effect: allow
    reason: "File writes allowed by default (secrets + governance self-mod denied above)"

  - id: default-allow-file-delete
    action: file.delete
    effect: allow
    reason: "Single-file deletes allowed (mass recursive delete via rm -rf denied above)"

  - id: default-deny-unknown
    action: unknown
    effect: deny
    reason: "Unknown tools are denied — the action vocabulary is a closed enum. If Normalize returns ActUnknown, extend the normalizer rather than broadening this rule."

# Router policy (added 2026-05-03; see also TS substrate in PR #230).
#
# When the operator opts in (touch ~/.chitin/router-enabled), the
# kernel's `router evaluate --hook-stdin` engages: kernel verdict →
# heuristics (in-process Go) → optional advisor consultation
# (claude -p subprocess) → composed response.
#
# Cold-start: ~26ms (Go binary). Most tool calls SKIP the advisor
# (deterministic checks pass + no heuristic fires).
# Router policy (added 2026-05-03).
#
# When the operator opts in (touch ~/.chitin/router-enabled), the
# chitin-router-hook wrapper engages: kernel verdict → heuristics →
# optional advisor consultation → composed response.
#
# To disable globally: rm ~/.chitin/router-enabled (instant; no
# config edit needed). To disable selectively per-heuristic, set
# .heuristics.<name>.enabled to false here.
#
# Cost shape: most tool calls SKIP the advisor (deterministic checks
# pass + no heuristic fires). Advisor only fires when blast_radius
# is above threshold OR floundering detected OR kernel denied.
router:
  enabled: true
  heuristics:
    blast_radius:
      enabled: true
      threshold: 0.6
    floundering:
      enabled: true
      # Calibrated 2026-05-05 from 142 sessions of real chain telemetry
      # (python -m analysis.floundering_calibration). The previous global
      # values (max_loop_count=3, max_stall_seconds=600) were authored
      # for the long-running Temporal-era T4 sessions; for the post-
      # always-T0 architecture, T0's 60-180s typical run window NEVER
      # crossed the 600s stall threshold, so the advisor never engaged.
      # Live test 2026-05-05: glm-flash silent-failed in 172s, advisor
      # never called. The new values target the 75th percentile of
      # successful-session max_stall (data: 57s + buffer = 90) and the
      # 90th percentile of successful-session max consecutive identical
      # tool+target (data: 2). This catches T0 silent failures inside
      # their typical run window and lets the advisor either nudge the
      # agent (continue + nudge) or escalate (takeover + escalate).
      # Per-tier thresholds are a follow-up — needs kernel schema change.
      max_loop_count: 2
      max_stall_seconds: 90
  advisor:
    enabled: true
    when: [blast_radius_above_threshold, floundering_detected]
    chain:
      max_depth: 3
      tier_steps: [T2, T3, T4]
    model: claude-code-headless
