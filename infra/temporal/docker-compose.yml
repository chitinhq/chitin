services:
  postgres:
    image: postgres:16
    container_name: chitin-temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - chitin-temporal-pg:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27
    container_name: chitin-temporal-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - "127.0.0.1:7233:7233"
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.40.0
    container_name: chitin-temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8233
    ports:
      - "127.0.0.1:8233:8080"
    restart: unless-stopped

volumes:
  chitin-temporal-pg:
    name: chitin-temporal-pg
