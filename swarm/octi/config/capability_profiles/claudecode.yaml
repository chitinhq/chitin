# Octi capability profile — claudecode driver (Claude Code as worker)
# Schema: octi.capability.v1 (frozen per spec 049 §R2)
# spec: 049-octi-swarm-role-architecture
#
# claudecode-the-driver (not claude-code-the-HITL-session) is an
# IMPLEMENTER-DRIVER, dispatched to per-ticket. Distinct from `claude`
# (operator-paired spec writer in claude.yaml).

schema: octi.capability.v1
agent_id: claudecode_driver
runtime: claude-code-cli-headless
model: claude-sonnet-or-opus
discord_channel_id: null
bus_audience_keys: []

surface_type: implementer_driver

roles:
  - name: implementer
    confidence: 0.70
    constraints:
      - test_first_per_spec_020
      - scope_matches_allowed_paths
      - single_task_spawn
    notes: |
      Headless Claude Code worker dispatched by spec 043's
      DispatchTicketWorkflow. Different from the operator-paired
      `claude` profile — this is non-interactive, single-task,
      pool-managed.

availability:
  status: pool
  in_flight: 0
  max_concurrent: 3

dispatch_target:
  task_queue: claudecode-py
  spawn_via: spawn_worker_subprocess.py
