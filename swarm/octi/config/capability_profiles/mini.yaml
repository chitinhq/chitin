# Octi capability profile — Mini
# Schema: octi.capability.v1 (frozen per spec 049 §R2)
# spec: 049-octi-swarm-role-architecture
#
# Mini is an EXECUTION SURFACE, not a role-holder. See spec 049 §R1
# "What's NOT a role" and §I6.

agent_id: mini
runtime: claude-code-cli-via-kitty
model: claude-sonnet-or-opus
discord_channel_id: null            # deleted 2026-05-19
bus_audience_keys: []               # no audience routing — Mini is dispatched to, not addressed

surface_type: execution_surface     # not "role: ..." — Mini cannot claim a role

dispatch_targets:                    # workflows that can dispatch TO Mini
  - implementer_workflow             # for long-horizon implementer work
  - octi_persistent_claude_session   # spec 038 slice 1

execution_properties:
  long_horizon: true
  persistent_session: true
  goal_mode: true
  worktree_managed: true             # spec 038 §file-system

availability:
  status: online
  in_flight: 0
  max_concurrent: 1                  # one kitty session per goal-id

notes: |
  Mini is the persistent-Claude-Code interface (kitty + goal mode +
  status.json) defined in spec 038. Octi dispatches tickets to Mini's
  driver task queue (`mini-cli`) the same way it dispatches to codex
  or claudecode drivers. Mini does NOT hold a role binding under spec
  049 — it executes work routed by the implementer role-holder.
