name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: go/execution-kernel/go.sum

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build better-sqlite3 native binding
        run: pnpm rebuild better-sqlite3
        env:
          npm_config_build_from_source: 'true'

      - name: Generate Go types from contracts
        run: pnpm exec tsx libs/contracts/tools/generate-go-types.ts

      - name: Go vet
        run: go vet ./...
        working-directory: go/execution-kernel

      - name: Go test
        run: go test ./...
        working-directory: go/execution-kernel

      - name: Build Go kernel
        run: pnpm exec nx run execution-kernel:build

      - name: Vitest (TS suites)
        run: pnpm exec vitest run

      - name: Oxlint
        run: pnpm exec oxlint . || true  # warnings only for phase-1
