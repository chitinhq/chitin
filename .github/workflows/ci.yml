name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # nx affected needs the base ref's history to compute the
          # diff. GitHub's shallow checkout doesn't fetch origin/main,
          # so without this `git diff origin/main HEAD` fails with
          # "ambiguous argument 'origin/main'". fetch-depth: 0 fetches
          # full history; standard nx repo setup uses this.
          fetch-depth: 0

      - uses: ./.github/actions/observe

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go/execution-kernel/go.sum

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Dashboard dist matches source
        run: |
          pnpm exec nx run @chitin/dashboard:build
          if [ -n "$(git status --porcelain -- apps/chitin-dashboard/dist)" ]; then
            git status --short -- apps/chitin-dashboard/dist
            echo "::error::apps/chitin-dashboard/dist is stale; run pnpm exec nx run @chitin/dashboard:build and commit the regenerated assets"
            exit 1
          fi

      - name: Ensure native modules built (better-sqlite3)
        run: |
          pnpm rebuild better-sqlite3 || true
          # Fallback: directly invoke the install lifecycle if pnpm's
          # approval gate skipped it.
          if ! find node_modules -path '*/better-sqlite3/build/Release/better_sqlite3.node' | grep -q .; then
            (cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3 && npm run install)
          fi
          find node_modules -name 'better_sqlite3.node' | head

      - name: Strict router stdin contract
        run: python3 -m unittest swarm.tests.test_pick_driver.PickDriverTests.test_rejects_prefixed_stdout_noise_before_json

      - name: Lifecycle trace smoke
        run: python3 -m unittest swarm.tests.test_trace_lifecycle

      - name: Plugin registration stdout contract
        run: pnpm exec vitest run apps/openclaw-plugin-governance/test/bridge.test.ts -t "keeps plugin registration stdout-clean by using the logger only"

      # Go type generator is v1-shaped; v2 Event struct is hand-maintained in
      # go/execution-kernel/internal/event/event.go during Phase 1.5.
      # Re-enable once the generator emits v2 (envelope + discriminated payload).
      # - name: Generate Go types from contracts
      #   run: pnpm exec tsx libs/contracts/tools/generate-go-types.ts

      - name: Go vet
        run: go vet ./...
        working-directory: go/execution-kernel

      - name: Verify signed governance policy
        env:
          CHITIN_POLICY_PUBLIC_KEY: ${{ vars.CHITIN_POLICY_PUBLIC_KEY || secrets.CHITIN_POLICY_PUBLIC_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.event.pull_request.base.ref }}"
          else
            base="HEAD~1"
          fi
          # LoadWithInheritance verifies every chitin.yaml on the
          # inheritance chain, so the gate must fire if any nested
          # chitin.yaml changed too — not just the repo-root one.
          #
          # examples/ and docs/ chitin.yaml files are templates the kernel
          # never loads at runtime (operators copy + edit them), so they are
          # intentionally unsigned and must not trip the signed-policy gate.
          changed=$(git diff --name-only "$base"...HEAD \
            | grep -E '(^|/)chitin\.yaml$' \
            | grep -vE '^(examples|docs)/' || true)
          if [ -z "$changed" ]; then
            echo "no chitin.yaml files changed; skipping signed-policy verification"
            exit 0
          fi
          if [ -z "${CHITIN_POLICY_PUBLIC_KEY:-}" ]; then
            echo "::error::chitin.yaml changed but CHITIN_POLICY_PUBLIC_KEY is not configured as a repository variable/secret; see docs/runbooks/governance-signed-policy.md"
            exit 1
          fi
          status=0
          while IFS= read -r policy; do
            [ -n "$policy" ] || continue
            echo "verifying $policy"
            if ! go run ./cmd/chitin-kernel policy verify \
                --policy-file "../../$policy" \
                --public-key "$CHITIN_POLICY_PUBLIC_KEY"; then
              echo "::error file=$policy::signature verification failed"
              status=1
            fi
          done <<< "$changed"
          exit $status
        working-directory: go/execution-kernel

      - name: Go test
        run: go test ./...
        working-directory: go/execution-kernel

      - name: Worktree naming check
        run: bash scripts/check-worktree-naming.sh
        working-directory: .

      - name: Build Go kernel
        run: pnpm exec nx run execution-kernel:build

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Governance boundary
        run: bash scripts/check-governance-boundary.sh

      # Nx affected: only run the test target on TS projects whose
      # source (or whose dependencies' source) changed since main.
      # Falls back to running EVERY project on push events to main
      # (`nx affected --base=HEAD~1` would scope to the merge commit's
      # diff, which under squash-merge equals the whole PR — same as
      # `--base=origin/main` on a feature branch).
      #
      # We pass --parallel=3 to avoid overwhelming CI runners that have
      # limited cores. The vitest suites individually finish in <10s,
      # so serial-ish parallelism is fine.
      - name: Determine Nx base
        id: nx-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          else
            # push to main: scope to the commit before HEAD (squash-merge
            # equivalent of "the PR's diff").
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: TypeScript typecheck (Nx affected)
        run: |
          # `tsc --build` over project references runs on every TS
          # project the diff touches (transitively). Catches the
          # accumulated noUnusedLocals / extension-less import / type-
          # mismatch errors that were sitting on main as of 2026-05-03.
          # Same affected logic as Vitest; docs-only PRs skip cleanly.
          #
          # Coverage gap acknowledged: this gate runs each project's
          # tsconfig.lib.json which only includes `src/**/*.ts`. Lib
          # tests (tests/), tools/, and root configs aren't covered —
          # regressions there still merge green. Apps' tests ARE
          # covered (their tsconfig.json includes tests/). The
          # structural fix is per-lib tsconfig.spec.json + project
          # references; filed as `tc-extend-to-tests-and-tools` in
          # docs/swarm-backlog.md.
          pnpm exec nx affected -t typecheck \
            --base=${{ steps.nx-base.outputs.base }} \
            --parallel=3

      - name: Vitest (Nx affected)
        run: |
          # Use nx affected for test target. If affected detection is not worth the complexity,
          # fallback to nx run-many (uncomment below and comment nx affected if needed).
          pnpm exec nx affected -t test \
            --base=${{ steps.nx-base.outputs.base }} \
            --parallel=3
          # Fallback:
          # pnpm exec nx run-many -t test --all --parallel=3

      - name: Layer-tag coverage lint
        run: |
          # Structural linter — every layer:* nx tag in any workspace
          # package.json must have a matching depConstraints entry in
          # eslint.config.mjs. Catches the omission pattern that hit
          # PRs #194/#195/#199/#192-cli-edge with the same Copilot
          # comment one ticket at a time.
          pnpm exec nx run @chitin/tooling-lint:lint:layer-tag-coverage

      - name: Validate (Nx affected)
        run: |
          pnpm exec nx affected -t validate \
            --base=${{ steps.nx-base.outputs.base }} \
            --parallel=3

      - name: Oxlint
        run: pnpm exec oxlint . || true  # warnings only for phase-1

      - name: Regression gate
        run: |
          # Runs every registered invariant in scripts/check-*.{sh,py}
          # against the merged-state tree. Hard-block: failure = CI failure.
          # See docs/superpowers/specs/2026-05-13-regression-gate.md
          # and docs/runbooks/regression-gate.md.
          python3 -m pip install --quiet --user pyyaml
          bash scripts/regression-gate.sh
