            - heading "body" [level=3] [ref=e147]
            - generic [ref=e148]: "**Source spec:** `.specify/specs/001-agent-bus/spec.md` — User Story 5 (P5). **Goal** The chitin-console renders typed attachments on bus threads as Jira-style clickable badges with live state — a `kind=pr` attachment shows the PR title + merge state + CI badge; `kind=spec` shows a spec preview; `kind=task` shows the kanban ticket status; `kind=discord` deep-links to the channel; `kind=url`/`file` render as clickable affordances. **Depends on** - Phase 3 (`/threads` console route exists). File this AFTER Phase 3 lands. **Approach** - Add `AttachmentBadgeComponent` to chitin-console with one renderer per kind. - For `kind=pr`: enrich via `gh api repos/{owner}/{name}/pulls/{n}` (cache 60s); render number + title + state pill (open/merged/closed) + checks bucket. - For `kind=spec`: read the markdown file relative to repo root; render the H1 + first paragraph as preview; full content on hover/expand. - For `kind=task`: query the kanban DB (read-only) for status + assignee; render as a status pill. - For `kind=discord`: render Discord channel/thread deep-link with channel name. - For `kind=url`/`file`: simple clickable link. **Acceptance criteria** - [ ] All 6 attachment kinds render their badge in the console thread detail view. - [ ] PR badge shows live merge state + CI bucket (auto-refresh on view). - [ ] Spec badge expands to show H1 + first paragraph; full content on click. - [ ] Task badge shows current status + assignee from kanban DB. - [ ] Renderers gracefully handle missing references (e.g. spec path that no longer exists → \"(missing)\" badge). **Out of scope** - Inline markdown preview for non-spec files (later). - Cross-repo PR lookups (current repo only for v1). - Permission-gated rendering. invariants_and_boundaries: Invariant: rendering a badge never blocks the thread view — all enrichment is async with a stable placeholder. Boundary: missing references → \"(missing)\" badge, never a crash or empty space. Boundary: enrichment cache TTL ≤ 60s so PR/ticket state stays fresh enough to act on. Boundary: no writes to GitHub or kanban from the renderer — read-only enrichment."
