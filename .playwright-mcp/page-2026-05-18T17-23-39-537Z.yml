                - listitem [ref=e395]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e396]: Blind or low vision
                - listitem [ref=e397]: Cancer (past or present)
                - listitem [ref=e398]: Cardiovascular or heart disease
                - listitem [ref=e399]: Celiac disease
                - listitem [ref=e400]: Cerebral palsy
                - listitem [ref=e401]: Deaf or serious difficulty hearing
                - listitem [ref=e402]: Diabetes
                - listitem [ref=e403]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e404]: Epilepsy or other seizure disorder
                - listitem [ref=e405]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e406]: Intellectual or developmental disability
                - listitem [ref=e407]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e408]: Missing limbs or partially missing limbs
                - listitem [ref=e409]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e410]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e411]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
