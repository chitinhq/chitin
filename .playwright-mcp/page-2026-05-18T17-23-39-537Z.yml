        - generic [ref=e19]:
          - generic [ref=e20]:
            - strong [ref=e23]: "About Glean:"
            - generic [ref=e25]: Glean is the Work AI platform that helps everyone work smarter with AI. What began as the industry’s most advanced enterprise search has evolved into a full-scale Work AI ecosystem, powering intelligent Search, an AI Assistant, and scalable AI agents on one secure, open platform. With over 100 enterprise SaaS connectors, flexible LLM choice, and robust APIs, Glean gives organizations the infrastructure to govern, scale, and customize AI across their entire business - without vendor lock-in or costly implementation cycles.
            - generic [ref=e27]: "At its core, Glean is redefining how enterprises find, use, and act on knowledge. Its Enterprise Graph and Personal Knowledge Graph map the relationships between people, content, and activity, delivering deeply personalized, context-aware responses for every employee. This foundation powers Glean’s agentic capabilities - AI agents that automate real work across teams by accessing the industry’s broadest range of data: enterprise and world, structured and unstructured, historical and real-time. The result: measurable business impact through faster onboarding, hours of productivity gained each week, and smarter, safer decisions at every level."
            - generic [ref=e29]: Recognized by Fast Company as one of the World’s Most Innovative Companies (Top 10, 2025), by CNBC’s Disruptor 50, Bloomberg’s AI Startups to Watch (2026), Forbes AI 50, and Gartner’s Tech Innovators in Agentic AI, Glean continues to accelerate its global impact. With customers across 50+ industries and 1,000+ employees in more than 25 countries, we’re helping the world’s largest organizations make every employee AI-fluent, and turning the superintelligent enterprise from concept into reality.
            - generic [ref=e31]: If you’re excited to shape how the world works, you’ll help build systems used daily across Microsoft Teams, Zoom, ServiceNow, Zendesk, GitHub, and many more - deeply embedded where people get things done. You’ll ship agentic capabilities on an open, extensible stack, with the craft and care required for enterprise trust, as we bring Work AI to every employee, in every company.
          - generic [ref=e34]:
            - strong [ref=e37]: "About the Role:"
            - generic [ref=e39]: You'll join as a founding member of Glean's forward deployed team and operate with the autonomy and accountability of a founder. Your job is to discover and build Glean's next generation of product surfaces, working in a pod with Forward Deployed PMs directly with the C-suite of the world's most influential companies and with Glean's own engineering and product teams.
            - generic [ref=e41]: Glean is a fully horizontal AI platform - and that scope is what makes this role unique. You won't be configuring existing products or optimizing within defined constraints. You'll identify the biggest unsolved business problems at our most strategic customers, build entirely new products to solve them, and in doing so shape what Glean becomes. The best of what you build ships to every Glean customer in the world. You get founder-level ownership with Glean's resources, relationships, and scale behind you.
            - strong [ref=e45]: "You will:"
            - list [ref=e47]:
              - listitem [ref=e48]:
                - generic [ref=e49]:
                  - strong [ref=e50]: "Discover and build Glean's next product surfaces:"
                  - text: Your primary job is 0-to-1 product creation. Nothing about what you're building is predefined - you'll work with your FDPM to identify where Glean's platform can be extended to solve problems no product currently solves, then design and ship it. What you build becomes what Glean ships.
              - listitem [ref=e51]:
                - generic [ref=e52]:
                  - strong [ref=e53]: "Lead deep opportunity discovery:"
                  - text: Before you write a line of code, you go deep on the business. What's structurally broken? Where is the biggest concentration of unsolved value? What's actually buildable, and what's the fastest path to something real that can be tested and learned from? You'll form strong hypotheses alongside your FDPM and pressure-test them directly with the people who have to live with the outcome.
              - listitem [ref=e54]:
                - generic [ref=e55]:
                  - strong [ref=e56]: "Be a technical partner to the C-suite:"
                  - text: You'll earn trust at the highest levels of your customer organizations - not just with technical teams, but with the executives who are accountable for outcomes. You can explain what you're building, why it will work, and what the risks are to anyone in the room.
              - listitem [ref=e57]:
                - generic [ref=e58]:
                  - strong [ref=e59]: Scale what works
                  - text: Once something works, you'll make it repeatable - working closely with the core R&D team to ensure the product is scalable
              - listitem [ref=e60]:
                - generic [ref=e61]:
                  - strong [ref=e62]: "Stay at the frontier with Glean's R&D team:"
                  - text: You'll work closely with Glean's core engineering and product teams, staying ahead of what's possible on the platform and actively shaping how its capabilities evolve. What you encounter in the field directly informs what gets built next.
            - strong [ref=e65]: "About you:"
            - list [ref=e67]:
              - listitem [ref=e68]: You think like a founder. When you walk into a customer, you're curious about the business, digging into what's broken, and figuring out what to build that doesn't yet exist. You're scrappy and resourceful, you move fast enough to learn, and you're as comfortable in a strategic discussion with a CEO as you are deep in a codebase. You've shipped actual products that real people use, that drove real outcomes - and you want to do it at a higher level of ambition.
              - listitem [ref=e69]:
                - generic [ref=e70]:
                  - strong [ref=e71]: "0-to-1 build track record:"
                  - text: You've built production software from scratch in ambiguous environments. You can point to something that didn't exist before you showed up and is now used by real people at scale.
              - listitem [ref=e72]:
                - generic [ref=e73]:
                  - strong [ref=e74]: "Production AI experience:"
                  - text: You've shipped AI-powered solutions in the real world - prompt engineering, agent development, evaluation frameworks, deployment at scale. Not just prototypes.
              - listitem [ref=e75]:
                - generic [ref=e76]:
                  - strong [ref=e77]: "Full-stack technical depth:"
                  - text: Strong programming skills across the stack with a deep understanding of and experience with how enterprise systems actually work.
              - listitem [ref=e78]:
                - generic [ref=e79]:
                  - strong [ref=e80]: "Business acumen:"
                  - text: You can walk into a customer, identify where the real problems are, and connect that diagnosis to a product hypothesis - without being handed a brief.
              - listitem [ref=e81]:
                - generic [ref=e82]:
                  - strong [ref=e83]: "Customer instinct:"
                  - text: You build trust quickly at every level of an organization, communicate with clarity, and know how to tailor your depth to the room.
              - listitem [ref=e84]:
                - generic [ref=e85]:
                  - strong [ref=e86]: "Builder's judgment:"
                  - text: You know what's actually buildable, how long it will take, and when to simplify scope to get something real into production faster. You spot problems early and solve them independently.
              - listitem [ref=e87]:
                - generic [ref=e88]:
                  - strong [ref=e89]: "Curiosity and scrappiness:"
                  - text: You're driven to understand problems deeply before solving them, and resourceful enough to find a path forward when none is obvious.
              - listitem [ref=e90]:
                - generic [ref=e91]:
                  - strong [ref=e92]: "Experience:"
                  - text: 4+ years in technical roles with a track record of shipping production software. Former technical founders are strongly encouraged to apply.
              - listitem [ref=e93]:
                - generic [ref=e94]:
                  - strong [ref=e95]: "Willingness to travel:"
                  - text: This role requires 25–50% travel.
              - listitem [ref=e96]:
                - strong [ref=e98]: "Nice to Have:"
                - list [ref=e99]:
                  - listitem [ref=e100]: Experience as a founder, at a top-tier technology company, or in a forward deployed engineering role.
                  - listitem [ref=e101]: A technical degree in CS, engineering, math, or a related field.
                  - listitem [ref=e102]: Deep familiarity with LLMs, retrieval systems, and evaluation frameworks.
                  - listitem [ref=e103]: Experience driving technology adoption inside large enterprises.
            - strong [ref=e106]: "Location:"
            - list [ref=e108]:
              - listitem [ref=e109]: This role is remote
              - listitem [ref=e110]: This role requires 25-50% travel
            - strong [ref=e113]: "Compensation & Benefits:"
            - generic [ref=e115]: "The standard range for this position is $160,000-$270,000 annually. Compensation offered will be determined by factors such as location, level, job-related knowledge, skills, and experience. Certain roles may be eligible for variable compensation, equity, and benefits. Special Note: This range encompasses varying levels of the role, you will be assessed for your level during the interview process."
            - generic [ref=e117]: We offer a comprehensive benefits package including competitive compensation, Medical, Vision, and Dental coverage, generous time-off policy, and the opportunity to contribute to your 401k plan to support your long-term goals. When you join, you'll receive a home office improvement stipend, as well as an annual education and wellness stipends to support your growth and wellbeing. We foster a vibrant company culture through regular events, and provide healthy lunches daily to keep you fueled and focused.
            - generic [ref=e119]: We are a diverse bunch of people and we want to continue to attract and retain a diverse range of people into our organization. We're committed to an inclusive and diverse company. We do not discriminate based on gender, ethnicity, sexual orientation, religion, civil or family status, age, disability, or race.
            - generic [ref=e121]: "#LI-REMOTE"
          - generic [ref=e122]:
            - strong [ref=e126]: "AI-First Mindset at Glean:"
            - generic [ref=e129]:
              - text: At Glean, AI fluency is core to how we work and we're committed to ensuring every new hire feels confident integrating AI into their everyday work.
              - strong [ref=e130]: As part of the interview process, you'll complete a brief AI-focused exercise or discussion so we can understand how you think about, design, and use AI to drive impact in your role.
              - text: Feel free to reference any tools, platforms, or workflows you use today — prior Glean experience isn't required.
            - strong [ref=e134]: "Global Data Privacy Notice for Job Candidates and Applicants:"
            - generic [ref=e137]:
              - text: Depending on your location, the General Data Protection Regulation (GDPR), California Consumer Privacy Act (CCPA), or other privacy laws may regulate the way we manage the data of job applicants. Our full notice outlining how data will be processed as part of the application procedure for applicable locations is available in our
              - link "Privacy Policy" [ref=e138] [cursor=pointer]:
                - /url: https://www.glean.com/privacy
                - strong [ref=e139]: Privacy Policy
              - text: . By submitting your application, you are agreeing to our use and processing of your data as required. US applicants and their applications are subject to arbitration of disputes as outlined in our
              - link "Applicant Arbitration Agreement" [ref=e140] [cursor=pointer]:
                - /url: https://www.glean.com/arbitrationagreement
                - strong [ref=e141]: Applicant Arbitration Agreement
              - text: .
            - generic [ref=e143]:
              - text: By clicking “Submit Application,” I confirm that I have read the Global Data Privacy Notice and the
              - link "Applicant Arbitration Agreement" [ref=e144] [cursor=pointer]:
                - /url: https://www.glean.com/arbitrationagreement
                - strong [ref=e145]: Applicant Arbitration Agreement
              - text: ", and I agree to the terms."
